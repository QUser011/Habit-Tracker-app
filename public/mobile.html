<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Day Tracker</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    height: 100vh;
    overflow: hidden;
}

/* APP */
#app {
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
    transition: background 0.3s ease, filter 0.2s ease;
}

/* DATE */
.date {
    font-size: 18px;
    opacity: 0.6;
}

/* CENTER */
.center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* ICON (CLICKABLE) */
.icon {
    font-size: 60px;
    margin-bottom: 15px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s ease;
}

.icon:active {
    transform: scale(0.9);
}

/* NOTE */
.note {
    font-size: 24px;
    line-height: 1.5;
    max-width: 90%;
    word-wrap: break-word;
}

/* DONE */
.done {
    filter: blur(1.2px);
    opacity: 0.6;
    transform: scale(0.98);
}

/* BACKGROUNDS */
.green { background: #a8e6a3; }
.red { background: #f5a3a3; }
.yellow { background: #fff3a3; }

/* TODAY HIGHLIGHT */
.today {
    box-shadow: inset 0 0 60px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div id="app">Loading...</div>

<script>
const API = window.location.origin;

let currentDate = new Date().toISOString().slice(0,10);

/* type map */
const typeMap = {
    green: { icon: "🛌" },
    red: { icon: "🏃" },
    yellow: { icon: "🏋️" }
};

/* SWIPE LOGIC */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
        changeDay(1); // swipe left → next
    }

    if (endX - startX > 50) {
        changeDay(-1); // swipe right → prev
    }
});

function changeDay(offset) {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + offset);
    currentDate = d.toISOString().slice(0,10);
    loadDay();
}

/* TOGGLE DONE */
async function toggleDone(data) {

    const newDone = !data.done;

    await fetch(`${API}/days`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            user_id: 1,
            date: currentDate,
            note: data.note || "",
            color: data.color || "",
            done: newDone
        })
    });

    loadDay();
}

function loadDay() {

    const today = new Date().toISOString().slice(0,10);

    fetch(`${API}/days/${currentDate}`)
    .then(r => r.json())
    .then(data => {

        const app = document.getElementById("app");

        const type = typeMap[data.color] || { icon: "⚪" };

        app.className = data.color || "";

        /* strong focus on today */
        if (currentDate === today) {
            app.classList.add("today");
        }

        /* blur if done */
        if (data.done) {
            app.classList.add("done");
        }

        app.innerHTML = `
            <div class="date">${currentDate}</div>

            <div class="center">
                <div class="icon" onclick='toggleDone(${JSON.stringify(data)})'>
                    ${type.icon}
                </div>

                <div class="note">
                    ${data.note || "No note"}
                </div>
            </div>
        `;
    })
    .catch(err => {
        document.getElementById("app").innerHTML = "ERROR: " + err;
    });
}

loadDay();
</script>

</body>
</html>
