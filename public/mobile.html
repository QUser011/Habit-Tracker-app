<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Day Tracker Mobile</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    height: 100vh;
}

/* APP */
#app {
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
    transition: background 0.25s ease, transform 0.2s ease;
}

/* CENTER AREA */
.center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* DATE BLOCK */
.date-block {
    text-align: center;
    margin-bottom: 30px;
}

.weekday {
    font-size: 36px;
    font-weight: 600;
}

.full-date {
    font-size: 36px;
    opacity: 0.6;
    font-weight: 600;
}

/* ICON */
.icon {
    font-size: 140px;
    line-height: 1;
}

/* TYPE */
.type {
    font-size: 36px;
    opacity: 0.7;
    font-weight: 600;
    margin-top: 30px;
}

/* NOTE 🔥 ADDED */
.note {
    margin-top: 25px;
    font-size: 28px;
    opacity: 0.9;
    max-width: 90%;
    word-break: break-word;
}

/* BACKGROUNDS */
.green { background: #a8e6a3; }
.red { background: #f5a3a3; }
.yellow { background: #fff3a3; }

/* DONE EFFECT */
.done {
    opacity: 0.4;
    filter: blur(0.6px);
    transform: scale(0.96);
}
</style>
</head>

<body>

<div id="app">Loading...</div>

<script>
const API = window.location.origin;

let currentDate = new Date().toISOString().slice(0,10);

/* TYPE MAP */
const typeMap = {
    green: { icon: "🛌", label: "Rest" },
    red: { icon: "🏃", label: "Run" },
    yellow: { icon: "🏋️", label: "Gym" }
};

/* WEEKDAY */
function getWeekday(dateStr) {
    return new Date(dateStr).toLocaleDateString("en-US", { weekday: "long" });
}

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", (e) => {
    let diff = e.changedTouches[0].clientX - startX;

    if (Math.abs(diff) > 50) {
        if (diff > 0) changeDay(-1);
        else changeDay(1);
    }
});

/* CHANGE DAY */
function changeDay(offset) {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + offset);
    currentDate = d.toISOString().slice(0,10);
    loadDay();
}

/* TOGGLE DONE */
function toggleDone(data) {
    const newDone = !data.done;

    fetch(`${API}/days`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            user_id: 1,
            date: currentDate,
            note: data.note || "",
            color: data.color || "",
            done: newDone
        })
    }).then(loadDay);
}

/* LOAD DAY */
function loadDay() {

    fetch(`${API}/days/${currentDate}`)
    .then(r => r.json())
    .then(data => {

        const app = document.getElementById("app");

        app.className = data.color || "";

        const type = typeMap[data.color] || {
            icon: "⚪",
            label: "No type"
        };

        const doneClass = data.done ? "done" : "";

        app.innerHTML = `
            <div class="center ${doneClass}" onclick='toggleDone(${JSON.stringify(data)})'>

                <div class="date-block">
                    <div class="weekday">${getWeekday(currentDate)}</div>
                    <div class="full-date">${currentDate}</div>
                </div>

                <div class="icon">${type.icon}</div>

                <div class="type">${type.label}</div>

                <div class="note">
                    ${data.note ? data.note : ""}
                </div>

            </div>
        `;
    })
    .catch(err => {
        document.getElementById("app").innerHTML = "ERROR: " + err;
    });
}

loadDay();
</script>

</body>
</html>
